name: Frontend CI/CD

on:
  pull_request:
    branches:
      - development
      - staging
      - master
    types:
      - opened
      - synchronize
      - reopened
      - closed

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  call-reusable-workflow:
    name: Frontend CI/Deploy
    # Only run CI for PRs that follow the permitted promotion flow:
    #   development → staging  (CI + deploy on merge)
    #   master      → staging  (CI only, backmerge — no deploy)
    #   staging     → master   (CI + deploy on merge)
     #   staging     → development (CI only, backmerge — no deploy)
     #   master      → development (CI only, backmerge — no deploy)
    if: |
      (github.event.pull_request.base.ref == 'development' &&
       (github.event.pull_request.head.ref == 'staging' || github.event.pull_request.head.ref == 'master')) ||
      (github.event.pull_request.base.ref == 'staging' &&
       (github.event.pull_request.head.ref == 'development' || github.event.pull_request.head.ref == 'master')) ||
      (github.event.pull_request.base.ref == 'master' &&
       github.event.pull_request.head.ref == 'staging')
    uses: zenos-work/zenos-infra/.github/workflows/frontend-ci-deploy.yml@development
    with:
      environment: ${{ (github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'staging' && github.event.pull_request.head.ref == 'development') && 'staging' || (github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'master' && github.event.pull_request.head.ref == 'staging') && 'production' || 'staging' }}
      run_deploy: ${{ github.event.action == 'closed' && github.event.pull_request.merged == true && ((github.event.pull_request.base.ref == 'staging' && github.event.pull_request.head.ref == 'development') || (github.event.pull_request.base.ref == 'master' && github.event.pull_request.head.ref == 'staging')) }}
      min_coverage: ${{ vars.FRONTEND_MIN_COVERAGE || '80' }}
    secrets: inherit
