name: Frontend CI/CD

on:
  push:
    branches:
      - development
      - staging
      - master

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  call-reusable-workflow:
    name: Frontend CI/Deploy
    # Runs on push to any promotion branch.
    # Deploy only happens when merging promotion PRs (developmentâ†’staging, stagingâ†’master)
    uses: zenos-work/zenos-infra/.github/workflows/frontend-ci-deploy.yml@development
    with:
      # Set environment based on target branch after merge
      environment: ${{ github.ref == 'refs/heads/staging' && 'staging' || github.ref == 'refs/heads/master' && 'production' || 'staging' }}
      # Deploy only when push is to staging (from devâ†’staging merge) or master (from stagingâ†’master merge)
      run_deploy: ${{ github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master' }}
      min_coverage: ${{ vars.FRONTEND_MIN_COVERAGE || '82' }}
    secrets: inherit
